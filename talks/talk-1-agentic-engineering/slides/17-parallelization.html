<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallelization</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0f;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    background: #0d0d0f;
    position: relative; overflow: hidden;
  }
  .slide::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(200,165,90,0.014) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,165,90,0.014) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="brainCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C8A55A" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#C8A55A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="loopAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6AACB8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6AACB8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="68%">
      <stop offset="0%"   stop-color="#0d0d0f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.88"/>
    </radialGradient>

    <filter id="brainGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="agentGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="pulseGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="textGlow" x="-5%" y="-40%" width="110%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow toward agent -->
    <marker id="arrowOut" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="rgba(106,172,184,0.65)"/>
    </marker>
    <!-- Arrow back to brain -->
    <marker id="arrowIn" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M 6 0 L 0 3 L 6 6 Z" fill="rgba(200,165,90,0.78)"/>
    </marker>

    <style>
      @keyframes orbitPulse {
        0%, 100% { opacity: 0.55; }
        50%       { opacity: 0.95; }
      }
      .agent-live { animation: orbitPulse 2.8s ease-in-out infinite; }
      .agent-live-2 { animation: orbitPulse 2.8s ease-in-out 0.9s infinite; }
      .agent-live-3 { animation: orbitPulse 2.8s ease-in-out 1.8s infinite; }
      .agent-live-4 { animation: orbitPulse 2.8s ease-in-out 0.45s infinite; }
      .agent-live-5 { animation: orbitPulse 2.8s ease-in-out 1.35s infinite; }
    </style>
  </defs>

  <!--
    CONCEPT:
    Engineer brain at center — bright, authoritative.
    Five agent loops radiating outward at different angles.
    Each loop: agent node + task label + two-way thread (send/receive).
    The loops run autonomously. The engineer doesn't work each one.
    They designed the factory. The factory runs.

    Top center: freed cognitive space label — what the engineer
    is actually doing while the loops run.

    Bottom: the reframe. "from assembly line worker to factory designer."
    Setup line pointing to Simon's talk.
  -->

  <!-- ============================================================ -->
  <!-- AMBIENT FIELD — radiating outward from center                 -->
  <!-- ============================================================ -->

  <!-- Outer orbit ring — faint, suggests many more loops -->
  <ellipse cx="640" cy="362" rx="430" ry="285"
    fill="none"
    stroke="rgba(200,165,90,0.05)"
    stroke-width="1"
    stroke-dasharray="3 8"/>

  <!-- Inner orbit ring — the active loops live here -->
  <ellipse cx="640" cy="362" rx="295" ry="198"
    fill="none"
    stroke="rgba(106,172,184,0.08)"
    stroke-width="1"
    stroke-dasharray="2 6"/>

  <!-- ============================================================ -->
  <!-- ENGINEER — center brain                                       -->
  <!-- ============================================================ -->

  <ellipse cx="640" cy="362" rx="160" ry="140" fill="url(#brainCore)"/>

  <g transform="translate(640, 354)" filter="url(#brainGlow)">
    <path d="
      M 0 -58 C 15 -64, 42 -52, 52 -34
      C 64 -18, 60 4, 54 20
      C 46 36, 34 48, 20 56
      C 6 64, -4 66, -16 62
      C -32 54, -42 38, -48 20
      C -56 4, -56 -14, -48 -32
      C -40 -50, -20 -60, 0 -58 Z
    "
    fill="rgba(235,220,195,0.15)"
    stroke="rgba(235,220,195,0.58)"
    stroke-width="1.5"/>
    <!-- Fissure -->
    <path d="M 0 -58 C -2 -26, 2 8, 0 52"
      fill="none" stroke="rgba(235,220,195,0.20)" stroke-width="1"/>
    <path d="M -22 -36 C -16 -20, -14 -2, -18 16" fill="none" stroke="rgba(235,220,195,0.13)" stroke-width="0.9"/>
    <path d="M -38 -6 C -28 4, -24 18, -30 32" fill="none" stroke="rgba(235,220,195,0.13)" stroke-width="0.9"/>
    <path d="M 20 -36 C 16 -20, 16 -2, 20 16" fill="none" stroke="rgba(235,220,195,0.13)" stroke-width="0.9"/>
    <path d="M 36 -6 C 28 4, 26 18, 32 30" fill="none" stroke="rgba(235,220,195,0.13)" stroke-width="0.9"/>
  </g>

  <text x="640" y="448"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.20em"
    fill="rgba(200,165,90,0.48)">YOU</text>

  <!-- What the engineer is actually doing — the freed capacity -->
  <text x="640" y="300"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="14" font-style="italic"
    fill="rgba(200,165,90,0.75)"
    filter="url(#textGlow)">architecture · design · direction</text>

  <!-- ============================================================ -->
  <!-- LOOP 1 — upper right: research / discovery                   -->
  <!-- ============================================================ -->

  <!-- Thread out -->
  <path id="l1out" d="M 692 308 C 760 258, 850 240, 920 238"
    fill="none" stroke="rgba(106,172,184,0.70)" stroke-width="1.2"
    marker-end="url(#arrowOut)"/>
  <!-- Thread back -->
  <path id="l1in" d="M 920 248 C 856 272, 772 298, 706 318"
    fill="none" stroke="rgba(200,165,90,0.42)" stroke-width="1.0"
    stroke-dasharray="4 3"
    marker-end="url(#arrowIn)"/>

  <!-- Agent node -->
  <ellipse cx="938" cy="242" rx="68" ry="26" fill="url(#loopAura)" class="agent-live"/>
  <rect x="880" y="224" width="116" height="36" rx="3"
    fill="rgba(10,14,20,0.92)"
    stroke="rgba(106,172,184,0.65)" stroke-width="1.2"
    class="agent-live"/>
  <text x="938" y="240" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="10" letter-spacing="0.08em"
    fill="rgba(255,255,255,0.94)">research agent</text>
  <text x="938" y="254" text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="10" font-style="italic"
    fill="rgba(106,172,184,0.70)">discovery</text>

  <!-- Pulse -->
  <circle r="2.5" fill="#6AACB8" opacity="0.80" filter="url(#pulseGlow)">
    <animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#l1out"/></animateMotion>
  </circle>
  <circle r="2" fill="#C8A55A" opacity="0.65" filter="url(#pulseGlow)">
    <animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite"><mpath href="#l1in"/></animateMotion>
  </circle>

  <!-- ============================================================ -->
  <!-- LOOP 2 — right: test agent                                   -->
  <!-- ============================================================ -->

  <path id="l2out" d="M 702 362 C 780 362, 860 362, 934 362"
    fill="none" stroke="rgba(106,172,184,0.70)" stroke-width="1.2"
    marker-end="url(#arrowOut)"/>
  <path id="l2in" d="M 934 372 C 860 380, 778 376, 706 374"
    fill="none" stroke="rgba(200,165,90,0.42)" stroke-width="1.0"
    stroke-dasharray="4 3"
    marker-end="url(#arrowIn)"/>

  <ellipse cx="952" cy="364" rx="68" ry="26" fill="url(#loopAura)" class="agent-live-2"/>
  <rect x="896" y="346" width="116" height="36" rx="3"
    fill="rgba(10,14,20,0.92)"
    stroke="rgba(106,172,184,0.65)" stroke-width="1.2"
    class="agent-live-2"/>
  <text x="954" y="362" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="10" letter-spacing="0.08em"
    fill="rgba(255,255,255,0.94)">test agent</text>
  <text x="954" y="376" text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="10" font-style="italic"
    fill="rgba(106,172,184,0.70)">execution</text>

  <circle r="2.5" fill="#6AACB8" opacity="0.80" filter="url(#pulseGlow)">
    <animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#l2out"/></animateMotion>
  </circle>
  <circle r="2" fill="#C8A55A" opacity="0.65" filter="url(#pulseGlow)">
    <animateMotion dur="1.8s" begin="0.9s" repeatCount="indefinite"><mpath href="#l2in"/></animateMotion>
  </circle>

  <!-- ============================================================ -->
  <!-- LOOP 3 — lower right: code review / synthesis                -->
  <!-- ============================================================ -->

  <path id="l3out" d="M 692 416 C 758 466, 848 490, 918 496"
    fill="none" stroke="rgba(106,172,184,0.70)" stroke-width="1.2"
    marker-end="url(#arrowOut)"/>
  <path id="l3in" d="M 916 508 C 852 500, 764 472, 700 428"
    fill="none" stroke="rgba(200,165,90,0.42)" stroke-width="1.0"
    stroke-dasharray="4 3"
    marker-end="url(#arrowIn)"/>

  <ellipse cx="936" cy="498" rx="68" ry="26" fill="url(#loopAura)" class="agent-live-3"/>
  <rect x="878" y="480" width="116" height="36" rx="3"
    fill="rgba(10,14,20,0.92)"
    stroke="rgba(106,172,184,0.65)" stroke-width="1.2"
    class="agent-live-3"/>
  <text x="936" y="496" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="10" letter-spacing="0.08em"
    fill="rgba(255,255,255,0.94)">review agent</text>
  <text x="936" y="510" text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="10" font-style="italic"
    fill="rgba(106,172,184,0.70)">sensemaking</text>

  <circle r="2.5" fill="#6AACB8" opacity="0.80" filter="url(#pulseGlow)">
    <animateMotion dur="2.5s" begin="0.4s" repeatCount="indefinite"><mpath href="#l3out"/></animateMotion>
  </circle>
  <circle r="2" fill="#C8A55A" opacity="0.65" filter="url(#pulseGlow)">
    <animateMotion dur="2.5s" begin="1.5s" repeatCount="indefinite"><mpath href="#l3in"/></animateMotion>
  </circle>

  <!-- ============================================================ -->
  <!-- LOOP 4 — left: context / worklog agent                       -->
  <!-- ============================================================ -->

  <path id="l4out" d="M 578 416 C 508 462, 410 488, 340 490"
    fill="none" stroke="rgba(106,172,184,0.70)" stroke-width="1.2"
    marker-end="url(#arrowOut)"/>
  <path id="l4in" d="M 340 502 C 412 498, 510 468, 576 428"
    fill="none" stroke="rgba(200,165,90,0.42)" stroke-width="1.0"
    stroke-dasharray="4 3"
    marker-end="url(#arrowIn)"/>

  <ellipse cx="322" cy="494" rx="68" ry="26" fill="url(#loopAura)" class="agent-live-4"/>
  <rect x="264" y="476" width="116" height="36" rx="3"
    fill="rgba(10,14,20,0.92)"
    stroke="rgba(106,172,184,0.65)" stroke-width="1.2"
    class="agent-live-4"/>
  <text x="322" y="492" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="10" letter-spacing="0.08em"
    fill="rgba(255,255,255,0.94)">context agent</text>
  <text x="322" y="506" text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="10" font-style="italic"
    fill="rgba(106,172,184,0.70)">persistence</text>

  <circle r="2.5" fill="#6AACB8" opacity="0.80" filter="url(#pulseGlow)">
    <animateMotion dur="2.0s" begin="0.6s" repeatCount="indefinite"><mpath href="#l4out"/></animateMotion>
  </circle>
  <circle r="2" fill="#C8A55A" opacity="0.65" filter="url(#pulseGlow)">
    <animateMotion dur="2.0s" begin="1.6s" repeatCount="indefinite"><mpath href="#l4in"/></animateMotion>
  </circle>

  <!-- ============================================================ -->
  <!-- LOOP 5 — upper left: monitoring / alerting                   -->
  <!-- ============================================================ -->

  <path id="l5out" d="M 586 308 C 516 258, 414 240, 344 238"
    fill="none" stroke="rgba(106,172,184,0.70)" stroke-width="1.2"
    marker-end="url(#arrowOut)"/>
  <path id="l5in" d="M 344 250 C 416 272, 520 298, 588 318"
    fill="none" stroke="rgba(200,165,90,0.42)" stroke-width="1.0"
    stroke-dasharray="4 3"
    marker-end="url(#arrowIn)"/>

  <ellipse cx="326" cy="242" rx="68" ry="26" fill="url(#loopAura)" class="agent-live-5"/>
  <rect x="268" y="224" width="116" height="36" rx="3"
    fill="rgba(10,14,20,0.92)"
    stroke="rgba(106,172,184,0.65)" stroke-width="1.2"
    class="agent-live-5"/>
  <text x="326" y="240" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="10" letter-spacing="0.08em"
    fill="rgba(255,255,255,0.94)">monitor agent</text>
  <text x="326" y="254" text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="10" font-style="italic"
    fill="rgba(106,172,184,0.70)">observation</text>

  <circle r="2.5" fill="#6AACB8" opacity="0.80" filter="url(#pulseGlow)">
    <animateMotion dur="2.3s" begin="1.2s" repeatCount="indefinite"><mpath href="#l5out"/></animateMotion>
  </circle>
  <circle r="2" fill="#C8A55A" opacity="0.65" filter="url(#pulseGlow)">
    <animateMotion dur="2.3s" begin="0.2s" repeatCount="indefinite"><mpath href="#l5in"/></animateMotion>
  </circle>

  <!-- ============================================================ -->
  <!-- THE REFRAME — bottom, the factory shift                      -->
  <!-- ============================================================ -->

  <line x1="80" y1="628" x2="1200" y2="628"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="640" y="656"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="17" font-style="italic"
    letter-spacing="0.02em"
    fill="rgba(255,255,255,0.74)">not the worker on the assembly line — the one who designed it</text>

  <!-- Pointer to Simon's talk — small, deliberate, not apologetic -->
  <text x="640" y="688"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(200,165,90,0.48)">more on this in two weeks · Simon</text>

  <!-- ============================================================ -->
  <!-- CASE STUDY DATA TEXTURE — faint, right edge                      -->
  <!-- ============================================================ -->

  <text x="1190" y="130"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.10em"
    fill="rgba(255,255,255,0.76)">A high-velocity team</text>

  <text x="1190" y="152"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="22" font-weight="500"
    fill="rgba(200,165,90,0.48)">40+</text>

  <text x="1190" y="172"
    text-anchor="end"
    font-family="EB Garamond, Georgia, serif"
    font-size="11" font-style="italic"
    fill="rgba(255,255,255,0.76)">commits / dev / week</text>

  <text x="1190" y="198"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(255,255,255,0.08)">vs industry avg: 2</text>

  <rect x="0" y="0" width="1280" height="720" fill="url(#vignette)"/>

</svg>
</div>
</body>
</html>
