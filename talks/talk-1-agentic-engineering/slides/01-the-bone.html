<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening — Kubrick</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0c0c0e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .slide {
    width: 1280px;
    height: 720px;
    background: #0c0c0e;
    position: relative;
    overflow: hidden;
  }
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Deep vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c0c0e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.88"/>
    </radialGradient>

    <!-- Monolith interior glow — very faint warm light within the rectangle -->
    <linearGradient id="monolithInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8A55A" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#5A8CC8" stop-opacity="0.03"/>
    </linearGradient>

    <!-- Edge glow on monolith -->
    <linearGradient id="monolithEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8A55A" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="rgba(200,165,90,0.15)" stop-opacity="0.15"/>
      <stop offset="65%" stop-color="rgba(90,140,200,0.32)" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#5A8CC8" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Soft outer glow for monolith -->
    <filter id="monolithGlow" x="-60%" y="-20%" width="220%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="edgeGlow" x="-40%" y="-10%" width="180%" height="120%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="textGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Star field noise pattern -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>

  </defs>

  <!-- ============================================================ -->
  <!-- STAR FIELD — sparse, hand-placed -->
  <!-- ============================================================ -->

  <!-- Distant stars — very faint -->
  <g fill="white">
    <circle cx="82"   cy="64"  r="0.6" opacity="0.25"/>
    <circle cx="198"  cy="142" r="0.5" opacity="0.18"/>
    <circle cx="340"  cy="88"  r="0.8" opacity="0.22"/>
    <circle cx="445"  cy="198" r="0.5" opacity="0.15"/>
    <circle cx="560"  cy="55"  r="0.6" opacity="0.20"/>
    <circle cx="688"  cy="120" r="0.4" opacity="0.18"/>
    <circle cx="755"  cy="45"  r="0.7" opacity="0.24"/>
    <circle cx="892"  cy="98"  r="0.5" opacity="0.16"/>
    <circle cx="1020" cy="72"  r="0.6" opacity="0.22"/>
    <circle cx="1140" cy="138" r="0.4" opacity="0.14"/>
    <circle cx="1218" cy="55"  r="0.7" opacity="0.20"/>
    <circle cx="94"   cy="280" r="0.5" opacity="0.15"/>
    <circle cx="168"  cy="440" r="0.6" opacity="0.18"/>
    <circle cx="55"   cy="560" r="0.4" opacity="0.14"/>
    <circle cx="148"  cy="640" r="0.6" opacity="0.20"/>
    <circle cx="288"  cy="618" r="0.5" opacity="0.16"/>
    <circle cx="400"  cy="664" r="0.7" opacity="0.18"/>
    <circle cx="520"  cy="648" r="0.4" opacity="0.14"/>
    <circle cx="1058" cy="620" r="0.6" opacity="0.22"/>
    <circle cx="1180" cy="580" r="0.5" opacity="0.16"/>
    <circle cx="1245" cy="638" r="0.7" opacity="0.20"/>
    <circle cx="1192" cy="310" r="0.5" opacity="0.18"/>
    <circle cx="1228" cy="440" r="0.6" opacity="0.15"/>
    <!-- A few slightly brighter ones -->
    <circle cx="310"  cy="200" r="1.0" opacity="0.30"/>
    <circle cx="980"  cy="148" r="1.1" opacity="0.28"/>
    <circle cx="1155" cy="220" r="0.9" opacity="0.25"/>
    <circle cx="112"  cy="380" r="1.0" opacity="0.28"/>
    <circle cx="1240" cy="280" r="0.9" opacity="0.22"/>
  </g>

  <!-- ============================================================ -->
  <!-- THE MONOLITH — 1:4:9 proportions (Kubrick's hint)
       Width 86, Height 344 (ratio ~1:4), centered left of center -->
  <!-- ============================================================ -->

  <!-- Outer atmospheric glow -->
  <rect x="553" y="148" width="86" height="344" rx="1"
    fill="none"
    stroke="#C8A55A"
    stroke-width="0.5"
    opacity="0.12"
    filter="url(#monolithGlow)"/>

  <!-- Monolith body — near-black, barely distinguishable from bg -->
  <rect x="553" y="188" width="86" height="344" rx="1"
    fill="url(#monolithInner)"
    stroke="none"/>

  <!-- Left edge — gold -->
  <line x1="553" y1="188" x2="553" y2="532"
    stroke="url(#monolithEdge)"
    stroke-width="0.8"
    filter="url(#edgeGlow)"/>

  <!-- Right edge — blue -->
  <line x1="639" y1="188" x2="639" y2="532"
    stroke="#5A8CC8"
    stroke-width="0.6"
    opacity="0.3"
    filter="url(#edgeGlow)"/>

  <!-- Top edge -->
  <line x1="553" y1="188" x2="639" y2="188"
    stroke="rgba(200,165,90,0.75)"
    stroke-width="0.7"/>

  <!-- Bottom edge — fades -->
  <line x1="553" y1="532" x2="639" y2="532"
    stroke="rgba(90,140,200,0.65)"
    stroke-width="0.7"/>

  <!-- ============================================================ -->
  <!-- VIGNETTE overlay -->
  <!-- ============================================================ -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#vignette)"/>

  <!-- ============================================================ -->
  <!-- TEXT — left side, breathing room -->
  <!-- ============================================================ -->

  <!-- Primary question — large, italic, restrained -->
  <text x="148" y="298"
    font-family="EB Garamond, Georgia, serif"
    font-size="42"
    font-style="italic"
    font-weight="400"
    letter-spacing="0.01em"
    fill="rgba(255,255,255,0.94)"
    filter="url(#textGlow)">what does a tool</text>

  <text x="148" y="356"
    font-family="EB Garamond, Georgia, serif"
    font-size="42"
    font-style="italic"
    font-weight="400"
    letter-spacing="0.01em"
    fill="rgba(255,255,255,0.94)">make possible</text>

  <text x="148" y="414"
    font-family="EB Garamond, Georgia, serif"
    font-size="42"
    font-style="italic"
    font-weight="400"
    letter-spacing="0.01em"
    fill="rgba(255,255,255,0.94)">to think?</text>

  <!-- Thin rule beneath the question -->
  <line x1="148" y1="436" x2="460" y2="436"
    stroke="rgba(200,165,90,0.42)"
    stroke-width="1"/>

  <!-- Secondary line — the real Kubrick thesis -->
  <text x="148" y="470"
    font-family="EB Garamond, Georgia, serif"
    font-size="17"
    font-style="italic"
    letter-spacing="0.03em"
    fill="rgba(255,255,255,0.76)">not just what it makes possible to do</text>

  <!-- ============================================================ -->
  <!-- KUBRICK CREDIT — very faint, bottom right -->
  <!-- ============================================================ -->

  <text x="1198" y="662"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="10"
    letter-spacing="0.14em"
    fill="rgba(255,255,255,0.92)">KUBRICK, 1968</text>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE — text anchored right of monolith -->
  <!-- ============================================================ -->

  <!-- A fragment from the film's real argument -->
  <text x="780" y="310"
    font-family="EB Garamond, Georgia, serif"
    font-size="15"
    font-style="italic"
    letter-spacing="0.04em"
    fill="rgba(255,255,255,0.90)">the ape doesn't become stronger.</text>

  <text x="780" y="335"
    font-family="EB Garamond, Georgia, serif"
    font-size="15"
    font-style="italic"
    letter-spacing="0.04em"
    fill="rgba(255,255,255,0.90)">it conceives of a new intention.</text>

</svg>
</div>
</body>
</html>
