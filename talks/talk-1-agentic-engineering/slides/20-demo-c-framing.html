<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo C — Chat Analysis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f11;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px;
    height: 720px;
    background: #111113;
    position: relative;
    overflow: hidden;
  }
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,165,90,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,165,90,0.018) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <radialGradient id="discoveryGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C8A55A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C8A55A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="sensemakingGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6AACB8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6AACB8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="executionGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#5A8CC8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#5A8CC8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="chatAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="bubbleGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="faint" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="labelGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrowGold" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 Z" fill="rgba(200,165,90,0.75)"/>
    </marker>
    <marker id="arrowTeal" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 Z" fill="rgba(106,172,184,0.65)"/>
    </marker>
    <marker id="arrowBlue" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 Z" fill="rgba(90,140,200,0.65)"/>
    </marker>

    <clipPath id="bounds">
      <rect width="1280" height="720"/>
    </clipPath>

  </defs>

  <!--
    CONCEPT:
    A chat interface — left side — rendered as a vertical scroll of
    conversation bubbles. Each bubble is tagged with a phase color.
    The conversation looks like a real engineering session:
    exploring a problem, then converging, then acting.

    Right side: the three phases emerge from the conversation as
    annotated bands — discovery (top), sensemaking (middle),
    execution (bottom). 

    A horizontal scan line (the analysis agent) moves across the
    chat, reading and classifying.

    The key insight: your conversations already contain this structure.
    The agent makes it visible.
  -->

  <!-- ============================================================ -->
  <!-- TITLE -->
  <!-- ============================================================ -->

  <text x="640" y="52"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="21" font-style="italic"
    letter-spacing="0.02em"
    fill="rgba(255,255,255,0.90)">every conversation already has a structure</text>

  <line x1="80" y1="68" x2="1200" y2="68"
    stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- LEFT: CHAT INTERFACE — a scrolling engineering session -->
  <!-- ============================================================ -->

  <!-- Chat window frame -->
  <rect x="72" y="90" width="480" height="590" rx="6"
    fill="rgba(10,12,16,0.80)"
    stroke="rgba(255,255,255,0.07)"
    stroke-width="1"/>

  <!-- Window chrome — top bar -->
  <rect x="72" y="90" width="480" height="32" rx="6"
    fill="rgba(255,255,255,0.04)"
    stroke="none"/>
  <line x1="72" y1="122" x2="552" y2="122"
    stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Window dots -->
  <circle cx="96"  cy="106" r="4" fill="rgba(255,255,255,0.74)"/>
  <circle cx="112" cy="106" r="4" fill="rgba(255,255,255,0.74)"/>
  <circle cx="128" cy="106" r="4" fill="rgba(255,255,255,0.74)"/>

  <!-- Session label in chrome -->
  <text x="312" y="110" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="10" letter-spacing="0.10em"
    fill="rgba(255,255,255,0.74)">engineering session</text>

  <!--
    CHAT BUBBLES — a real-feeling engineering conversation
    Left-aligned = user, Right-aligned = agent
    Each tagged with a phase color via left border accent

    Structure of the session:
    1. [DISCOVERY]   User: "I want to understand why our p99 latency 
                            spiked last Tuesday..."
    2. [DISCOVERY]   Agent: "Here are three possible explanations..."
    3. [DISCOVERY]   User: "Interesting — can we look at the deploy 
                            history around that window?"
    4. [SENSEMAKING] Agent: "Cross-referencing the deploy at 14:32 
                            with the latency trace..."
    5. [SENSEMAKING] User: "So the connection pool exhaustion is the 
                            pattern. What's the blast radius?"
    6. [SENSEMAKING] Agent: "Affects services A, B, D. Here's the 
                            dependency graph..."
    7. [EXECUTION]   User: "Generate the patch and the rollback plan"
    8. [EXECUTION]   Agent: "Here's the config change and test cases..."
  -->

  <!-- BUBBLE 1 — user, DISCOVERY -->
  <rect x="88" y="136" width="332" height="52" rx="4"
    fill="rgba(200,165,90,0.06)"
    stroke="rgba(200,165,90,0.0)" stroke-width="0"/>
  <!-- Gold left accent -->
  <rect x="88" y="136" width="3" height="52" rx="1"
    fill="rgba(200,165,90,0.75)"/>
  <text x="100" y="155"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.06em"
    fill="rgba(200,165,90,0.78)">you</text>
  <text x="100" y="171"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.90)">why did our p99 latency spike last Tuesday?</text>
  <text x="100" y="183"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.92)">I can't find a clean cause in the logs...</text>

  <!-- BUBBLE 2 — agent, DISCOVERY -->
  <rect x="88" y="198" width="380" height="64" rx="4"
    fill="rgba(106,172,184,0.04)"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <rect x="88" y="198" width="3" height="64" rx="1"
    fill="rgba(200,165,90,0.78)"/>
  <text x="100" y="215"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.06em"
    fill="rgba(255,255,255,0.74)">agent</text>
  <text x="100" y="231"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">Three possible causes in that window:</text>
  <text x="100" y="247"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.35)">deploy at 14:32, config drift, upstream dep change.</text>

  <!-- BUBBLE 3 — user, DISCOVERY -->
  <rect x="88" y="274" width="348" height="40" rx="4"
    fill="rgba(200,165,90,0.06)"/>
  <rect x="88" y="274" width="3" height="40" rx="1"
    fill="rgba(200,165,90,0.75)"/>
  <text x="100" y="291"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.06em"
    fill="rgba(200,165,90,0.78)">you</text>
  <text x="100" y="307"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.90)">show me the deploy history around 14:00–15:00</text>

  <!-- Phase transition marker — DISCOVERY → SENSEMAKING -->
  <line x1="88" y1="326" x2="540" y2="326"
    stroke="rgba(106,172,184,0.20)" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="314" y="323"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="8" letter-spacing="0.14em"
    fill="rgba(106,172,184,0.65)">↓  sensemaking</text>

  <!-- BUBBLE 4 — agent, SENSEMAKING -->
  <rect x="88" y="334" width="420" height="64" rx="4"
    fill="rgba(106,172,184,0.04)"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <rect x="88" y="334" width="3" height="64" rx="1"
    fill="rgba(106,172,184,0.65)"/>
  <text x="100" y="351"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.06em"
    fill="rgba(255,255,255,0.74)">agent</text>
  <text x="100" y="367"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">Deploy at 14:32 correlates with pool exhaustion.</text>
  <text x="100" y="383"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.35)">Latency trace shows cascade starting 4 min later.</text>

  <!-- BUBBLE 5 — user, SENSEMAKING -->
  <rect x="88" y="408" width="400" height="40" rx="4"
    fill="rgba(106,172,184,0.06)"/>
  <rect x="88" y="408" width="3" height="40" rx="1"
    fill="rgba(106,172,184,0.65)"/>
  <text x="100" y="425"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.06em"
    fill="rgba(106,172,184,0.65)">you</text>
  <text x="100" y="441"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.90)">connection pool exhaustion. what's the blast radius?</text>

  <!-- Phase transition marker — SENSEMAKING → EXECUTION -->
  <line x1="88" y1="460" x2="540" y2="460"
    stroke="rgba(90,140,200,0.20)" stroke-width="1" stroke-dasharray="3 5"/>
  <text x="314" y="457"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="8" letter-spacing="0.14em"
    fill="rgba(90,140,200,0.65)">↓  execution</text>

  <!-- BUBBLE 6 — user, EXECUTION -->
  <rect x="88" y="468" width="348" height="40" rx="4"
    fill="rgba(90,140,200,0.06)"/>
  <rect x="88" y="468" width="3" height="40" rx="1"
    fill="rgba(90,140,200,0.65)"/>
  <text x="100" y="485"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.06em"
    fill="rgba(90,140,200,0.65)">you</text>
  <text x="100" y="501"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.90)">generate the patch and the rollback plan</text>

  <!-- BUBBLE 7 — agent, EXECUTION -->
  <rect x="88" y="518" width="440" height="52" rx="4"
    fill="rgba(90,140,200,0.04)"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <rect x="88" y="518" width="3" height="52" rx="1"
    fill="rgba(90,140,200,0.65)"/>
  <text x="100" y="535"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.06em"
    fill="rgba(255,255,255,0.74)">agent</text>
  <text x="100" y="551"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">Config change, test cases, rollback conditions.</text>
  <text x="100" y="563"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.35)">3 edge cases flagged for your review.</text>

  <!-- Input bar at bottom of chat -->
  <rect x="88" y="608" width="446" height="38" rx="4"
    fill="rgba(255,255,255,0.03)"
    stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="104" y="632"
    font-family="IBM Plex Mono, monospace"
    font-size="10" letter-spacing="0.06em"
    fill="rgba(255,255,255,0.92)">message...</text>

  <!-- ============================================================ -->
  <!-- CENTER: SCAN LINE — the analysis agent reading the chat -->
  <!-- ============================================================ -->

  <!-- Scan line — horizontal, animated, moves down the chat -->
  <line x1="72" y1="300" x2="552" y2="300"
    stroke="rgba(200,165,90,0.48)"
    stroke-width="1.5">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 0,380; 0,0"
      dur="6s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </line>

  <!-- Scan glow -->
  <rect x="72" y="292" width="480" height="16" rx="2"
    fill="rgba(200,165,90,0.04)">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 0,380; 0,0"
      dur="6s"
      repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.4 0 0.6 1; 0.4 0 0.6 1"/>
  </rect>

  <!-- ============================================================ -->
  <!-- RIGHT: PHASE BANDS — what the agent surfaces -->
  <!-- ============================================================ -->

  <!-- Connecting arrows — from chat to phase bands -->
  <path d="M 558 207 C 610 207, 650 190, 690 180"
    fill="none" stroke="rgba(200,165,90,0.78)" stroke-width="1.2"
    marker-end="url(#arrowGold)"/>

  <path d="M 558 390 C 610 390, 650 368, 690 362"
    fill="none" stroke="rgba(106,172,184,0.70)" stroke-width="1.2"
    marker-end="url(#arrowTeal)"/>

  <path d="M 558 520 C 610 520, 650 540, 690 548"
    fill="none" stroke="rgba(90,140,200,0.70)" stroke-width="1.2"
    marker-end="url(#arrowBlue)"/>

  <!-- ── DISCOVERY BAND -->
  <ellipse cx="870" cy="188" rx="210" ry="82" fill="url(#discoveryGlow)" opacity="0.9"/>

  <rect x="700" y="120" width="340" height="136" rx="5"
    fill="rgba(10,12,16,0.75)"
    stroke="rgba(200,165,90,0.78)" stroke-width="1.2"/>

  <text x="870" y="148"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.20em"
    fill="rgba(200,165,90,0.78)">DISCOVERY</text>

  <text x="870" y="178"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="22" font-style="italic"
    fill="rgba(255,255,255,0.94)"
    filter="url(#faint)">exploring the unknown</text>

  <text x="870" y="204"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">open questions · branching hypotheses</text>

  <!-- Bubble count annotation -->
  <text x="1028" y="148"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(200,165,90,0.75)">3 exchanges</text>

  <!-- Progress bar for this phase -->
  <rect x="720" y="238" width="300" height="3" rx="1"
    fill="rgba(255,255,255,0.06)"/>
  <rect x="720" y="238" width="200" height="3" rx="1"
    fill="rgba(200,165,90,0.78)"/>

  <!-- ── SENSEMAKING BAND -->
  <ellipse cx="870" cy="372" rx="210" ry="72" fill="url(#sensemakingGlow)" opacity="0.9"/>

  <rect x="700" y="310" width="340" height="124" rx="5"
    fill="rgba(10,12,16,0.75)"
    stroke="rgba(106,172,184,0.38)" stroke-width="1.2"/>

  <text x="870" y="336"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.20em"
    fill="rgba(106,172,184,0.70)">SENSEMAKING</text>

  <text x="870" y="366"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="22" font-style="italic"
    fill="rgba(255,255,255,0.94)"
    filter="url(#faint)">building understanding</text>

  <text x="870" y="390"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">convergence · causal reasoning</text>

  <text x="1028" y="336"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(106,172,184,0.65)">2 exchanges</text>

  <rect x="720" y="424" width="300" height="3" rx="1"
    fill="rgba(255,255,255,0.06)"/>
  <rect x="720" y="424" width="140" height="3" rx="1"
    fill="rgba(106,172,184,0.70)"/>

  <!-- ── EXECUTION BAND -->
  <ellipse cx="870" cy="548" rx="210" ry="72" fill="url(#executionGlow)" opacity="0.9"/>

  <rect x="700" y="488" width="340" height="124" rx="5"
    fill="rgba(10,12,16,0.75)"
    stroke="rgba(90,140,200,0.38)" stroke-width="1.2"/>

  <text x="870" y="514"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.20em"
    fill="rgba(90,140,200,0.70)">EXECUTION</text>

  <text x="870" y="544"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="22" font-style="italic"
    fill="rgba(255,255,255,0.94)"
    filter="url(#faint)">taking action</text>

  <text x="870" y="568"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">directed output · judgment applied</text>

  <text x="1028" y="514"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(90,140,200,0.65)">2 exchanges</text>

  <rect x="720" y="602" width="300" height="3" rx="1"
    fill="rgba(255,255,255,0.06)"/>
  <rect x="720" y="602" width="100" height="3" rx="1"
    fill="rgba(90,140,200,0.70)"/>

  <!-- ============================================================ -->
  <!-- FAR RIGHT: KEY INSIGHT -->
  <!-- ============================================================ -->

  <line x1="1068" y1="110" x2="1068" y2="630"
    stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <text x="1088" y="178"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(200,165,90,0.75)">open, branching</text>
  <text x="1088" y="196"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(200,165,90,0.78)">low constraint</text>

  <text x="1088" y="362"
    font-family="EB Garamond, Georgia, serif"

  <text x="1088" y="380"

  <text x="1088" y="540"

  <text x="1088" y="558"

  <rect x="1245" y="130" width="4" height="490" rx="2"

  <rect x="1243" y="130" width="8" height="163" rx="2"

  <rect x="1243" y="293" width="8" height="163" rx="2"

  <rect x="1243" y="456" width="8" height="164" rx="2"

  <!-- ============================================================ -->

  <line x1="80" y1="648" x2="1200" y2="648"

  <text x="640" y="676"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="16" font-style="italic"

</div>
</body>
</html>
