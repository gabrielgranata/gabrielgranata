<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Gap Is the Zone</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0c0c0e;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px;
    height: 720px;
    background: #0d0d0f;
    position: relative;
    overflow: hidden;
  }
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,165,90,0.014) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,165,90,0.014) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="0%"   stop-color="#0d0d0f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.88"/>
    </radialGradient>

    <radialGradient id="zoneGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C8A55A" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#C8A55A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="knownGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="latentGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C8A55A" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#C8A55A" stop-opacity="0"/>
    </radialGradient>

    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="dimGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="quoteGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="zoneAtmosphere" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      @keyframes dashFlow {
        to { stroke-dashoffset: -24; }
      }
      @keyframes latentPulse {
        0%, 100% { opacity: 0.18; }
        50%       { opacity: 0.55; }
      }
      @keyframes zonePulse {
        0%, 100% { opacity: 0.50; }
        50%       { opacity: 0.85; }
      }
      .missing-edge {
        stroke-dasharray: 4 6;
        animation: dashFlow 2.4s linear infinite;
      }
      .latent-node {
        animation: latentPulse 3.2s ease-in-out infinite;
      }
      .zone-label {
        animation: zonePulse 4s ease-in-out infinite;
      }
    </style>

  </defs>

  <!-- ============================================================ -->
  <!-- LEFT: THE GRAPH — known / zone / latent                      -->
  <!-- ============================================================ -->

  <!-- Known region atmosphere -->
  <ellipse cx="215" cy="348" rx="148" ry="152" fill="url(#knownGlow)" opacity="0.9"/>

  <!-- Known edges -->
  <line x1="145" y1="272" x2="208" y2="302" stroke="rgba(255,255,255,0.56)" stroke-width="1.4"/>
  <line x1="208" y1="302" x2="274" y2="276" stroke="rgba(255,255,255,0.56)" stroke-width="1.4"/>
  <line x1="208" y1="302" x2="194" y2="372" stroke="rgba(255,255,255,0.92)" stroke-width="1.2"/>
  <line x1="194" y1="372" x2="145" y2="272" stroke="rgba(255,255,255,0.94)" stroke-width="1"/>
  <line x1="274" y1="276" x2="294" y2="342" stroke="rgba(255,255,255,0.74)" stroke-width="1.2"/>
  <line x1="294" y1="342" x2="194" y2="372" stroke="rgba(255,255,255,0.90)" stroke-width="1.2"/>
  <line x1="145" y1="272" x2="162" y2="400" stroke="rgba(255,255,255,0.56)" stroke-width="1"/>
  <line x1="162" y1="400" x2="194" y2="372" stroke="rgba(255,255,255,0.94)" stroke-width="1.2"/>
  <line x1="162" y1="400" x2="224" y2="432" stroke="rgba(255,255,255,0.56)" stroke-width="1"/>
  <line x1="224" y1="432" x2="294" y2="342" stroke="rgba(255,255,255,0.56)" stroke-width="1"/>
  <line x1="115" y1="342" x2="145" y2="272" stroke="rgba(255,255,255,0.56)" stroke-width="1"/>
  <line x1="115" y1="342" x2="162" y2="400" stroke="rgba(255,255,255,0.94)" stroke-width="1.2"/>

  <!-- Known nodes -->
  <circle cx="145" cy="272" r="6"   fill="rgba(255,255,255,0.94)" filter="url(#dimGlow)"/>
  <circle cx="208" cy="302" r="8"   fill="rgba(255,255,255,0.92)" filter="url(#nodeGlow)"/>
  <circle cx="274" cy="276" r="5.5" fill="rgba(255,255,255,0.90)" filter="url(#dimGlow)"/>
  <circle cx="194" cy="372" r="7"   fill="rgba(255,255,255,0.75)" filter="url(#nodeGlow)"/>
  <circle cx="294" cy="342" r="5"   fill="rgba(255,255,255,0.92)"/>
  <circle cx="162" cy="400" r="5"   fill="rgba(255,255,255,0.92)"/>
  <circle cx="224" cy="432" r="4.5" fill="rgba(255,255,255,0.74)"/>
  <circle cx="115" cy="342" r="4.5" fill="rgba(255,255,255,0.94)"/>

  <text x="188" y="484"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.16em"
    fill="rgba(255,255,255,0.92)">what you can articulate</text>

  <!-- ── ZONE -->
  <ellipse cx="385" cy="348" rx="66" ry="128"
    fill="url(#zoneGlow)" opacity="1"
    filter="url(#zoneAtmosphere)"/>

  <line x1="336" y1="196" x2="336" y2="498"
    stroke="rgba(200,165,90,0.42)" stroke-width="1" stroke-dasharray="2 9"/>
  <line x1="434" y1="196" x2="434" y2="498"
    stroke="rgba(200,165,90,0.42)" stroke-width="1" stroke-dasharray="2 9"/>

  <text x="385" y="310"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="8" letter-spacing="0.22em"
    fill="rgba(200,165,90,0.78)"
    class="zone-label">ZPD</text>

  <text x="385" y="356"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="34" font-style="italic"
    fill="rgba(200,165,90,0.75)"
    filter="url(#quoteGlow)">?</text>

  <text x="385" y="402"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="8" letter-spacing="0.14em"
    fill="rgba(200,165,90,0.75)">the gap</text>

  <!-- ── LATENT cluster -->
  <ellipse cx="562" cy="338" rx="118" ry="128" fill="url(#latentGlow)" opacity="0.7"/>

  <!-- Existing latent edges -->
  <line x1="494" y1="268" x2="548" y2="304" stroke="rgba(200,165,90,0.48)" stroke-width="1.1"/>
  <line x1="548" y1="304" x2="570" y2="380" stroke="rgba(200,165,90,0.15)" stroke-width="1"/>

  <!-- Missing edges — animated reach -->
  <line x1="494" y1="268" x2="558" y2="222"
    stroke="rgba(200,165,90,0.78)" stroke-width="1" class="missing-edge"/>
  <line x1="570" y1="380" x2="628" y2="334"
    stroke="rgba(200,165,90,0.48)" stroke-width="1" class="missing-edge"/>
  <line x1="548" y1="304" x2="628" y2="264"
    stroke="rgba(200,165,90,0.42)" stroke-width="1" class="missing-edge"/>
  <line x1="570" y1="380" x2="514" y2="436"
    stroke="rgba(200,165,90,0.42)" stroke-width="1" class="missing-edge"/>
  <line x1="628" y1="334" x2="628" y2="264"
    stroke="rgba(200,165,90,0.16)" stroke-width="1" class="missing-edge"/>

  <!-- Latent nodes -->
  <circle cx="494" cy="268" r="5.5" fill="rgba(200,165,90,0.75)" filter="url(#dimGlow)" class="latent-node"/>
  <circle cx="558" cy="222" r="4"   fill="rgba(200,165,90,0.42)" class="latent-node" style="animation-delay:0.6s"/>
  <circle cx="548" cy="304" r="6"   fill="rgba(200,165,90,0.75)" filter="url(#dimGlow)" class="latent-node" style="animation-delay:1.2s"/>
  <circle cx="628" cy="264" r="4"   fill="rgba(200,165,90,0.48)" class="latent-node" style="animation-delay:0.3s"/>
  <circle cx="570" cy="380" r="5"   fill="rgba(200,165,90,0.78)" filter="url(#dimGlow)" class="latent-node" style="animation-delay:1.8s"/>
  <circle cx="628" cy="334" r="4"   fill="rgba(200,165,90,0.48)" class="latent-node" style="animation-delay:0.9s"/>
  <circle cx="514" cy="436" r="3.5" fill="rgba(200,165,90,0.42)" class="latent-node" style="animation-delay:2.4s"/>

  <text x="562" y="484"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.16em"
    fill="rgba(200,165,90,0.26)">what you sense but can't yet connect</text>

  <!-- Spanning bracket — names the whole diagram -->
  <path d="M 100 176 L 100 168 L 648 168 L 648 176"
    fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="374" y="156"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(255,255,255,0.56)">the engineer's working model at any moment</text>

  <!-- ============================================================ -->
  <!-- VERTICAL RULE                                                 -->
  <!-- ============================================================ -->

  <line x1="710" y1="100" x2="710" y2="626"
    stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- RIGHT: THE ARGUMENT — problem framing, three beats           -->
  <!-- ============================================================ -->

  <!-- Beat 1: Polanyi — the gap contains something real -->
  <text x="742" y="152"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.16em"
    fill="rgba(255,255,255,0.94)">Polanyi  ·  1966</text>

  <text x="742" y="180"
    font-family="EB Garamond, Georgia, serif"
    font-size="20" font-style="italic"
    fill="rgba(255,255,255,0.92)"
    filter="url(#quoteGlow)">we know more than we can tell</text>

  <text x="742" y="206"
    font-family="EB Garamond, Georgia, serif"
    font-size="14" font-style="italic"
    fill="rgba(255,255,255,0.94)">the latent cluster isn't ignorance.</text>
  <text x="742" y="224"
    font-family="EB Garamond, Georgia, serif"
    font-size="14" font-style="italic"
    fill="rgba(255,255,255,0.94)">it's knowledge not yet made focal.</text>

  <line x1="742" y1="252" x2="1198" y2="252"
    stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Beat 2: Vygotsky / Dreyfus — failure is productive -->
  <text x="742" y="278"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.16em"
    fill="rgba(255,255,255,0.94)">Vygotsky  ·  Dreyfus</text>

  <text x="742" y="306"
    font-family="EB Garamond, Georgia, serif"
    font-size="20" font-style="italic"
    fill="rgba(255,255,255,0.92)"
    filter="url(#quoteGlow)">the failure is the zone</text>

  <text x="742" y="332"
    font-family="EB Garamond, Georgia, serif"
    font-size="14" font-style="italic"
    fill="rgba(255,255,255,0.94)">expertise isn't built by receiving correct answers.</text>
  <text x="742" y="350"
    font-family="EB Garamond, Georgia, serif"
    font-size="14" font-style="italic"
    fill="rgba(255,255,255,0.94)">it's built by reaching across the gap —</text>
  <text x="742" y="368"
    font-family="EB Garamond, Georgia, serif"
    font-size="14" font-style="italic"
    fill="rgba(255,255,255,0.94)">and finding the connection yourself.</text>

  <line x1="742" y1="396" x2="1198" y2="396"
    stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Beat 3: the problem with tools that close the gap -->
  <text x="742" y="422"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.16em"
    fill="rgba(255,255,255,0.94)">the problem</text>

  <text x="742" y="450"
    font-family="EB Garamond, Georgia, serif"
    font-size="20" font-style="italic"
    fill="rgba(255,255,255,0.92)"
    filter="url(#quoteGlow)">a scaffold holds you in the zone</text>

  <text x="742" y="476"
    font-family="EB Garamond, Georgia, serif"
    font-size="20" font-style="italic"
    fill="rgba(200,165,90,0.85)"
    filter="url(#quoteGlow)">a shortcut closes it</text>

  <text x="742" y="516"
    font-family="EB Garamond, Georgia, serif"
    font-size="14" font-style="italic"
    fill="rgba(255,255,255,0.94)">a tool that resolves the tension for you</text>
  <text x="742" y="534"
    font-family="EB Garamond, Georgia, serif"
    font-size="14" font-style="italic"
    fill="rgba(255,255,255,0.94)">has skipped the step where the model grows.</text>
  <text x="742" y="556"
    font-family="EB Garamond, Georgia, serif"
    font-size="14" font-style="italic"
    fill="rgba(255,255,255,0.90)">you received an answer. you built nothing.</text>

  <!-- ============================================================ -->
  <!-- VIGNETTE + FOOTER                                            -->
  <!-- ============================================================ -->

  <rect x="0" y="0" width="1280" height="720" fill="url(#vignette)"/>

  <line x1="80" y1="648" x2="1200" y2="648"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="1198" y="672"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.12em"
    fill="rgba(255,255,255,0.74)">Polanyi · Vygotsky · Dreyfus</text>

</svg>
</div>
</body>
</html>
