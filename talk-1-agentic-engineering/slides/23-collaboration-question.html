<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Collaboration Question</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090b;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px; height: 720px;
    background: #09090b;
    position: relative; overflow: hidden;
  }
  .slide::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(200,165,90,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,165,90,0.012) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="68%">
      <stop offset="0%"   stop-color="#09090b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dimGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-5%" y="-40%" width="110%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes questionPulse {
        0%, 100% { opacity: 0.55; }
        50%       { opacity: 1.0; }
      }
      @keyframes stepFade {
        0%, 100% { opacity: 0.35; }
        50%       { opacity: 0.60; }
      }
      .question-mark { animation: questionPulse 3.5s ease-in-out infinite; }
      .step-1 { animation: stepFade 5s ease-in-out infinite; animation-delay: 0s; }
      .step-2 { animation: stepFade 5s ease-in-out infinite; animation-delay: 0.8s; }
      .step-3 { animation: stepFade 5s ease-in-out infinite; animation-delay: 1.6s; }
    </style>
  </defs>

  <!-- ============================================================ -->
  <!-- TOP: THE INHERITANCE — how each era transmitted craft        -->
  <!-- Four small topology sketches, left to right, growing more    -->
  <!-- distributed. Final slot: open / unresolved.                  -->
  <!-- ============================================================ -->

  <!-- Era label row -->
  <text x="80"  y="88" font-family="IBM Plex Mono, monospace" font-size="8" letter-spacing="0.14em" fill="rgba(255,255,255,0.94)">assembly era</text>
  <text x="298" y="88" font-family="IBM Plex Mono, monospace" font-size="8" letter-spacing="0.14em" fill="rgba(255,255,255,0.94)">HLL · open source</text>
  <text x="524" y="88" font-family="IBM Plex Mono, monospace" font-size="8" letter-spacing="0.14em" fill="rgba(255,255,255,0.94)">cloud · devops</text>
  <text x="750" y="88" font-family="IBM Plex Mono, monospace" font-size="8" letter-spacing="0.14em" fill="rgba(255,255,255,0.94)">AI era</text>

  <!-- Dividers -->
  <line x1="270" y1="72" x2="270" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="500" y1="72" x2="500" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="730" y1="72" x2="730" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- ERA 1: Centralized — one expert, spokes out -->
  <!-- Central expert node, several dependent nodes -->
  <circle cx="165" cy="152" r="6" fill="rgba(255,255,255,0.90)" filter="url(#dimGlow)"/>
  <circle cx="108" cy="120" r="3" fill="rgba(255,255,255,0.92)"/>
  <circle cx="222" cy="120" r="3" fill="rgba(255,255,255,0.92)"/>
  <circle cx="108" cy="184" r="3" fill="rgba(255,255,255,0.92)"/>
  <circle cx="222" cy="184" r="3" fill="rgba(255,255,255,0.92)"/>
  <circle cx="165" cy="108" r="3" fill="rgba(255,255,255,0.92)"/>
  <line x1="165" y1="152" x2="108" y2="120" stroke="rgba(255,255,255,0.94)" stroke-width="1"/>
  <line x1="165" y1="152" x2="222" y2="120" stroke="rgba(255,255,255,0.94)" stroke-width="1"/>
  <line x1="165" y1="152" x2="108" y2="184" stroke="rgba(255,255,255,0.94)" stroke-width="1"/>
  <line x1="165" y1="152" x2="222" y2="184" stroke="rgba(255,255,255,0.94)" stroke-width="1"/>
  <line x1="165" y1="152" x2="165" y2="108" stroke="rgba(255,255,255,0.94)" stroke-width="1"/>
  <text x="165" y="204" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.90)">hoarded expertise</text>
  <text x="165" y="218" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.92)">proximity to one master</text>

  <!-- ERA 2: Distributed — more nodes, more edges, docs as medium -->
  <circle cx="355" cy="132" r="4" fill="rgba(255,255,255,0.94)" filter="url(#dimGlow)"/>
  <circle cx="398" cy="158" r="4" fill="rgba(255,255,255,0.94)" filter="url(#dimGlow)"/>
  <circle cx="320" cy="162" r="4" fill="rgba(255,255,255,0.94)" filter="url(#dimGlow)"/>
  <circle cx="370" cy="185" r="3.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="330" cy="118" r="3"   fill="rgba(255,255,255,0.94)"/>
  <circle cx="415" cy="132" r="3"   fill="rgba(255,255,255,0.94)"/>
  <!-- More interconnected — no single center -->
  <line x1="355" y1="132" x2="398" y2="158" stroke="rgba(255,255,255,0.94)" stroke-width="1"/>
  <line x1="355" y1="132" x2="320" y2="162" stroke="rgba(255,255,255,0.94)" stroke-width="1"/>
  <line x1="398" y1="158" x2="370" y2="185" stroke="rgba(255,255,255,0.56)" stroke-width="1"/>
  <line x1="320" y1="162" x2="370" y2="185" stroke="rgba(255,255,255,0.56)" stroke-width="1"/>
  <line x1="330" y1="118" x2="355" y2="132" stroke="rgba(255,255,255,0.92)" stroke-width="1"/>
  <line x1="415" y1="132" x2="398" y2="158" stroke="rgba(255,255,255,0.92)" stroke-width="1"/>
  <line x1="330" y1="118" x2="320" y2="162" stroke="rgba(255,255,255,0.76)" stroke-width="0.8" stroke-dasharray="2 3"/>
  <text x="370" y="204" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.90)">distributed contribution</text>
  <text x="370" y="218" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.92)">docs as transmission medium</text>

  <!-- ERA 3: Cross-functional — different role types, bridged -->
  <!-- Two clusters that now talk to each other -->
  <circle cx="555" cy="132" r="4"   fill="rgba(90,140,200,0.65)" filter="url(#dimGlow)"/>
  <circle cx="578" cy="158" r="3.5" fill="rgba(90,140,200,0.65)"/>
  <circle cx="538" cy="155" r="3.5" fill="rgba(90,140,200,0.65)"/>
  <circle cx="638" cy="130" r="4"   fill="rgba(106,172,184,0.65)" filter="url(#dimGlow)"/>
  <circle cx="655" cy="158" r="3.5" fill="rgba(106,172,184,0.65)"/>
  <circle cx="622" cy="155" r="3.5" fill="rgba(106,172,184,0.65)"/>
  <!-- Cluster 1 internal -->
  <line x1="555" y1="132" x2="578" y2="158" stroke="rgba(90,140,200,0.20)" stroke-width="1"/>
  <line x1="555" y1="132" x2="538" y2="155" stroke="rgba(90,140,200,0.20)" stroke-width="1"/>
  <!-- Cluster 2 internal -->
  <line x1="638" y1="130" x2="655" y2="158" stroke="rgba(106,172,184,0.20)" stroke-width="1"/>
  <line x1="638" y1="130" x2="622" y2="155" stroke="rgba(106,172,184,0.20)" stroke-width="1"/>
  <!-- Bridge -->
  <line x1="578" y1="158" x2="622" y2="155" stroke="rgba(255,255,255,0.74)" stroke-width="1.2"/>
  <line x1="555" y1="132" x2="638" y2="130" stroke="rgba(255,255,255,0.56)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="597" y="204" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.90)">cross-functional teams</text>
  <text x="597" y="218" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.92)">walls collapsed by shared ops</text>

  <!-- ERA 4: AI era — open, unresolved -->
  <!-- Sparse nodes, some connections forming, question mark center -->
  <circle cx="820" cy="132" r="3.5" fill="rgba(200,165,90,0.75)" class="step-1"/>
  <circle cx="860" cy="155" r="3"   fill="rgba(200,165,90,0.48)" class="step-2"/>
  <circle cx="790" cy="158" r="3.5" fill="rgba(200,165,90,0.42)" class="step-3"/>
  <circle cx="845" cy="185" r="3"   fill="rgba(200,165,90,0.75)" class="step-1"/>
  <!-- Tentative edges — dashed, forming -->
  <line x1="820" y1="132" x2="860" y2="155" stroke="rgba(200,165,90,0.78)" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="820" y1="132" x2="790" y2="158" stroke="rgba(200,165,90,0.48)" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="860" y1="155" x2="845" y2="185" stroke="rgba(200,165,90,0.15)" stroke-width="1" stroke-dasharray="2 5"/>
  <text x="825" y="204" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="11" font-style="italic" fill="rgba(200,165,90,0.48)" class="question-mark">still forming</text>
  <text x="825" y="218" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="11" font-style="italic" fill="rgba(255,255,255,0.92)">topology unknown</text>

  <!-- ============================================================ -->
  <!-- HORIZONTAL RULE — separates era sketches from the argument   -->
  <!-- ============================================================ -->

  <line x1="80" y1="238" x2="1200" y2="238"
    stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- THE QUESTION — center of slide, dominant                     -->
  <!-- ============================================================ -->

  <text x="640" y="310"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="36" font-style="italic"
    fill="rgba(255,255,255,0.90)"
    filter="url(#textGlow)">when AI mediates the scaffold,</text>

  <text x="640" y="356"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="36" font-style="italic"
    fill="rgba(255,255,255,0.90)"
    filter="url(#textGlow)">what happens to the transmission of craft?</text>

  <!-- Sub-question — smaller, honest -->
  <text x="640" y="404"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="16" font-style="italic"
    fill="rgba(255,255,255,0.94)">the junior engineer learned by being near the senior engineer.</text>
  <text x="640" y="426"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="16" font-style="italic"
    fill="rgba(255,255,255,0.94)">tacit knowledge transmitted through proximity, through watching, through failure together.</text>
  <text x="640" y="462"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="16" font-style="italic"
    fill="rgba(200,165,90,0.78)">if the scaffold is now synthetic — what does that change?</text>

  <!-- ============================================================ -->
  <!-- STEPPING STONES — visible beginnings, not prescriptions      -->
  <!-- ============================================================ -->

  <line x1="80" y1="496" x2="1200" y2="496"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="640" y="524"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.18em"
    fill="rgba(255,255,255,0.94)">the stepping stones are already here</text>

  <!-- Three stones — left to right, each a seed of the answer -->
  <!-- Stone 1 -->
  <rect x="112" y="546" width="292" height="72" rx="3"
    fill="rgba(255,255,255,0.02)"
    stroke="rgba(200,165,90,0.48)" stroke-width="1"/>
  <text x="258" y="572"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.12em"
    fill="rgba(200,165,90,0.75)">shared context artifacts</text>
  <text x="258" y="592"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.92)">worklogs, steering files, context docs</text>
  <text x="258" y="608"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">externalizing craft as shared infrastructure</text>

  <!-- Stone 2 -->
  <rect x="494" y="546" width="292" height="72" rx="3"
    fill="rgba(255,255,255,0.02)"
    stroke="rgba(106,172,184,0.38)" stroke-width="1"/>
  <text x="640" y="572"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.12em"
    fill="rgba(106,172,184,0.65)">prompt culture</text>
  <text x="640" y="592"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.92)">the way you frame a problem to an agent</text>
  <text x="640" y="608"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">encodes tacit knowledge that can now be shared</text>

  <!-- Stone 3 -->
  <rect x="876" y="546" width="292" height="72" rx="3"
    fill="rgba(255,255,255,0.02)"
    stroke="rgba(90,140,200,0.38)" stroke-width="1"/>
  <text x="1022" y="572"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.12em"
    fill="rgba(90,140,200,0.65)">collaborative intelligence</text>
  <text x="1022" y="592"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.92)">teams who share practices get smarter together</text>
  <text x="1022" y="608"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">the unit of learning shifts from person to team</text>

  <!-- Open ellipsis — no resolution -->
  <text x="640" y="660"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="20" font-style="italic"
    fill="rgba(255,255,255,0.56)">the destination is yours to build</text>

  <rect x="0" y="0" width="1280" height="720" fill="url(#vignette)"/>

</svg>
</div>
</body>
</html>
