<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Loop Wants to Be Tight</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f11;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px;
    height: 720px;
    background: #111113;
    position: relative;
    overflow: hidden;
  }
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,165,90,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,165,90,0.018) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <radialGradient id="brainAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C8A55A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C8A55A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="artifactAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#5A8CC8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#5A8CC8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="agentAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6AACB8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6AACB8" stop-opacity="0"/>
    </radialGradient>

    <!-- Broken session ghost — red warmth -->
    <radialGradient id="brokenAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c86060" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c86060" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="brainGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="artifactGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="faint" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="pulseGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Tight loop: solid gold -->
    <marker id="arrowGold" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 Z" fill="rgba(200,165,90,0.75)"/>
    </marker>

    <!-- Broken loop: faded red -->
    <marker id="arrowBroken" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 Z" fill="rgba(200,96,96,0.50)"/>
    </marker>

    <!-- Artifact flow: blue -->
    <marker id="arrowBlue" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 Z" fill="rgba(90,140,200,0.65)"/>
    </marker>

    <!-- Agent flow: teal -->
    <marker id="arrowTeal" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M 0 0 L 7 3.5 L 0 7 Z" fill="rgba(106,172,184,0.65)"/>
    </marker>

  </defs>

  <!--
    LAYOUT CONCEPT:

    LEFT HALF — the broken loop: two brain instances (session A, session B)
    separated by a gap. The cold start. No thread between them.
    
    RIGHT HALF — the tight loop: one brain, connected to two artifacts
    (worklog, context file), connected to agent. The loop closes.
    Artifacts are the bridge between sessions.

    A vertical rule divides the two worlds.
    The title phrase sits at top. The bottom has the invariant.
  -->

  <!-- ============================================================ -->
  <!-- TITLE -->
  <!-- ============================================================ -->

  <text x="640" y="54"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="22" font-style="italic"
    letter-spacing="0.02em"
    fill="rgba(255,255,255,0.90)">the loop wants to be tight</text>

  <line x1="80" y1="72" x2="1200" y2="72"
    stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- CENTER DIVIDER -->
  <!-- ============================================================ -->

  <line x1="600" y1="90" x2="600" y2="650"
    stroke="rgba(255,255,255,0.06)" stroke-width="1"
    stroke-dasharray="4 6"/>

  <!-- Left label -->
  <text x="300" y="108"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.20em"
    fill="rgba(200,96,96,0.40)">WITHOUT PERSISTENCE</text>

  <!-- Right label -->
  <text x="940" y="108"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.20em"
    fill="rgba(200,165,90,0.75)">WITH PERSISTENCE</text>

  <!-- ============================================================ -->
  <!-- LEFT SIDE — BROKEN LOOP -->
  <!-- Two brains, two sessions, no thread connecting them -->
  <!-- ============================================================ -->

  <!-- SESSION A — upper left -->
  <ellipse cx="195" cy="242" rx="95" ry="82" fill="url(#brokenAura)" opacity="0.8"/>

  <!-- Brain A -->
  <g transform="translate(195, 234)" filter="url(#brainGlow)" opacity="0.55">
    <path d="
      M 0 -46 C 12 -50, 32 -42, 40 -28
      C 50 -16, 46 0, 42 12
      C 36 26, 26 36, 16 42
      C 6 48, -4 50, -12 46
      C -24 40, -32 28, -36 16
      C -42 4, -42 -10, -36 -22
      C -30 -36, -14 -44, 0 -46 Z
    "
    fill="rgba(235,220,195,0.10)"
    stroke="rgba(235,220,195,0.32)"
    stroke-width="1.3"/>
    <path d="M 0 -46 C -1 -20, 1 8, 0 40"
      fill="none" stroke="rgba(235,220,195,0.15)" stroke-width="1"/>
  </g>

  <text x="195" y="302"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(255,255,255,0.90)">session A</text>

  <!-- Ghost agent — the stranger -->
  <ellipse cx="400" cy="242" rx="72" ry="32" fill="url(#agentAura)" opacity="0.5"/>
  <ellipse cx="400" cy="242" rx="58" ry="24"
    fill="rgba(16,18,22,0.90)"
    stroke="rgba(106,172,184,0.32)" stroke-width="1.2"/>
  <text x="400" y="246" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="11" letter-spacing="0.08em"
    fill="rgba(255,255,255,0.94)">agent</text>

  <!-- Weak, single-direction thread A → agent — no return -->
  <path d="M 248 234 C 300 230, 340 236, 342 242"
    fill="none"
    stroke="rgba(200,96,96,0.30)"
    stroke-width="1.2"
    stroke-dasharray="4 4"
    marker-end="url(#arrowBroken)"/>

  <!-- No return arrow — the break -->
  <!-- Just a stub starting from agent going nowhere -->
  <path d="M 342 250 C 300 262, 270 280, 248 290"
    fill="none"
    stroke="rgba(200,96,96,0.12)"
    stroke-width="1"
    stroke-dasharray="2 6"/>

  <!-- SESSION B — lower left, disconnected from A -->
  <ellipse cx="195" cy="480" rx="95" ry="82" fill="url(#brokenAura)" opacity="0.8"/>

  <g transform="translate(195, 472)" filter="url(#brainGlow)" opacity="0.55">
    <path d="
      M 0 -46 C 12 -50, 32 -42, 40 -28
      C 50 -16, 46 0, 42 12
      C 36 26, 26 36, 16 42
      C 6 48, -4 50, -12 46
      C -24 40, -32 28, -36 16
      C -42 4, -42 -10, -36 -22
      C -30 -36, -14 -44, 0 -46 Z
    "
    fill="rgba(235,220,195,0.10)"
    stroke="rgba(235,220,195,0.32)"
    stroke-width="1.3"/>
    <path d="M 0 -46 C -1 -20, 1 8, 0 40"
      fill="none" stroke="rgba(235,220,195,0.15)" stroke-width="1"/>
  </g>

  <text x="195" y="540"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(255,255,255,0.90)">session B</text>

  <!-- Stranger agent B — separate, no shared context -->
  <ellipse cx="400" cy="480" rx="72" ry="32" fill="url(#agentAura)" opacity="0.5"/>
  <ellipse cx="400" cy="480" rx="58" ry="24"
    fill="rgba(16,18,22,0.90)"
    stroke="rgba(106,172,184,0.32)" stroke-width="1.2"/>
  <text x="400" y="484" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="11" letter-spacing="0.08em"
    fill="rgba(255,255,255,0.94)">agent</text>

  <path d="M 248 472 C 300 468, 340 474, 342 480"
    fill="none"
    stroke="rgba(200,96,96,0.30)"
    stroke-width="1.2"
    stroke-dasharray="4 4"
    marker-end="url(#arrowBroken)"/>

  <path d="M 342 488 C 300 500, 270 518, 248 528"
    fill="none"
    stroke="rgba(200,96,96,0.12)"
    stroke-width="1"
    stroke-dasharray="2 6"/>

  <!-- GAP between sessions — the cold start -->
  <!-- Visible empty space between A and B with a label -->
  <line x1="110" y1="348" x2="490" y2="348"
    stroke="rgba(200,96,96,0.12)"
    stroke-width="1"
    stroke-dasharray="3 6"/>

  <text x="300" y="343"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.16em"
    fill="rgba(200,96,96,0.40)">cold start</text>

  <!-- Loop resets to zero annotation -->
  <text x="300" y="370"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.94)">the loop resets to zero</text>

  <!-- The stranger annotation -->
  <text x="400" y="395"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="12" font-style="italic"
    fill="rgba(200,96,96,0.35)">a stranger, every time</text>

  <!-- ============================================================ -->
  <!-- RIGHT SIDE — TIGHT LOOP -->
  <!-- One brain, worklog, context file, agent — all connected -->
  <!-- ============================================================ -->

  <!-- Brain — center right, bright -->
  <ellipse cx="840" cy="362" rx="130" ry="112" fill="url(#brainAura)" opacity="1.2"/>

  <g transform="translate(840, 354)" filter="url(#brainGlow)">
    <path d="
      M 0 -54 C 14 -58, 38 -48, 48 -32
      C 58 -18, 56 2, 50 18
      C 44 32, 32 44, 18 52
      C 6 58, -4 60, -14 56
      C -28 50, -38 36, -44 20
      C -52 4, -52 -12, -46 -28
      C -38 -46, -18 -54, 0 -54 Z
    "
    fill="rgba(235,220,195,0.14)"
    stroke="rgba(235,220,195,0.52)"
    stroke-width="1.5"/>
    <path d="M 0 -54 C -2 -24, 2 8, 0 48"
      fill="none" stroke="rgba(235,220,195,0.20)" stroke-width="1"/>
    <path d="M -20 -34 C -14 -20, -12 -2, -16 14" fill="none" stroke="rgba(235,220,195,0.13)" stroke-width="1"/>
    <path d="M -34 -6 C -26 2, -22 16, -28 28" fill="none" stroke="rgba(235,220,195,0.13)" stroke-width="1"/>
    <path d="M 18 -34 C 14 -20, 14 -2, 18 14" fill="none" stroke="rgba(235,220,195,0.13)" stroke-width="1"/>
    <path d="M 32 -6 C 26 2, 24 16, 30 26" fill="none" stroke="rgba(235,220,195,0.13)" stroke-width="1"/>
  </g>

  <text x="840" y="440"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.18em"
    fill="rgba(200,165,90,0.78)">YOU</text>

  <!-- ── WORKLOG.MD — top right of brain -->
  <ellipse cx="1040" cy="222" rx="92" ry="34" fill="url(#artifactAura)" filter="url(#artifactGlow)"/>
  <rect x="960" y="200" width="160" height="44" rx="4"
    fill="rgba(14,18,26,0.92)"
    stroke="rgba(90,140,200,0.65)" stroke-width="1.4"/>
  <text x="1040" y="220" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="11" letter-spacing="0.10em"
    fill="rgba(255,255,255,0.94)">worklog.md</text>
  <text x="1040" y="236" text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="11" font-style="italic"
    fill="rgba(90,140,200,0.65)">loop persistence</text>

  <!-- ── CONTEXT.MD — bottom right of brain -->
  <ellipse cx="1040" cy="502" rx="92" ry="34" fill="url(#artifactAura)" filter="url(#artifactGlow)"/>
  <rect x="960" y="480" width="160" height="44" rx="4"
    fill="rgba(14,18,26,0.92)"
    stroke="rgba(90,140,200,0.65)" stroke-width="1.4"/>
  <text x="1040" y="500" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="11" letter-spacing="0.10em"
    fill="rgba(255,255,255,0.94)">context.md</text>
  <text x="1040" y="516" text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="11" font-style="italic"
    fill="rgba(90,140,200,0.65)">loop memory</text>

  <!-- ── AGENT — left of brain (receives context, returns fast) -->
  <ellipse cx="660" cy="362" rx="88" ry="36" fill="url(#agentAura)" filter="url(#artifactGlow)"/>
  <rect x="588" y="340" width="144" height="44" rx="4"
    fill="rgba(14,18,26,0.92)"
    stroke="rgba(106,172,184,0.70)" stroke-width="1.5"/>
  <text x="660" y="360" text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="11" letter-spacing="0.10em"
    fill="rgba(255,255,255,0.90)">agent</text>
  <text x="660" y="376" text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="11" font-style="italic"
    fill="rgba(106,172,184,0.65)">feedback immediately</text>

  <!-- ── CONNECTIONS — all bidirectional, tight -->

  <!-- Brain ↔ Worklog -->
  <path id="toWorklog"
    d="M 874 308 C 920 272, 968 248, 968 236"
    fill="none"
    stroke="rgba(90,140,200,0.65)"
    stroke-width="1.4"
    marker-end="url(#arrowBlue)"/>
  <path d="M 968 224 C 952 240, 920 278, 886 312"
    fill="none"
    stroke="rgba(90,140,200,0.38)"
    stroke-width="1.2"
    stroke-dasharray="4 3"
    marker-end="url(#arrowBlue)"/>

  <!-- Label on worklog thread -->
  <text x="938" y="258"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(200,165,90,0.75)">observations</text>
  <text x="938" y="296"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(90,140,200,0.65)">recalled next session</text>

  <!-- Brain ↔ Context -->
  <path d="M 874 406 C 920 444, 966 470, 968 484"
    fill="none"
    stroke="rgba(90,140,200,0.65)"
    stroke-width="1.4"
    marker-end="url(#arrowBlue)"/>
  <path d="M 968 496 C 950 476, 918 452, 884 416"
    fill="none"
    stroke="rgba(90,140,200,0.38)"
    stroke-width="1.2"
    stroke-dasharray="4 3"
    marker-end="url(#arrowBlue)"/>

  <text x="938" y="460"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(200,165,90,0.75)">intent · goals</text>
  <text x="938" y="424"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(90,140,200,0.65)">cold start solved</text>

  <!-- Brain ↔ Agent — tight, fast, bidirectional -->
  <path id="toAgent"
    d="M 792 346 C 758 342, 730 348, 720 354"
    fill="none"
    stroke="rgba(200,165,90,0.75)"
    stroke-width="1.6"
    marker-end="url(#arrowTeal)"/>
  <path id="fromAgent"
    d="M 720 368 C 742 374, 770 376, 800 374"
    fill="none"
    stroke="rgba(106,172,184,0.65)"
    stroke-width="1.6"
    marker-end="url(#arrowGold)"/>

  <!-- Pulse on agent thread — fast, tight -->
  <circle r="3" fill="#C8A55A" opacity="0.85" filter="url(#pulseGlow)">
    <animateMotion dur="1.6s" repeatCount="indefinite">
      <mpath href="#toAgent"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#6AACB8" opacity="0.85" filter="url(#pulseGlow)">
    <animateMotion dur="1.6s" begin="0.8s" repeatCount="indefinite">
      <mpath href="#fromAgent"/>
    </animateMotion>
  </circle>

  <!-- Agent interaction labels -->
  <text x="752" y="336"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(200,165,90,0.75)">question · intent</text>
  <text x="752" y="390"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.08em"
    fill="rgba(106,172,184,0.65)">reaction · signal</text>

  <!-- Worklog ↔ Agent — the artifact feeds the agent directly -->
  <path d="M 968 218 C 920 200, 760 220, 718 340"
    fill="none"
    stroke="rgba(90,140,200,0.20)"
    stroke-width="1.1"
    stroke-dasharray="3 5"
    marker-end="url(#arrowTeal)"/>

  <text x="820" y="210"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="11" font-style="italic"
    fill="rgba(255,255,255,0.56)">context loaded at session start</text>

  <!-- ============================================================ -->
  <!-- TIGHT LOOP ANNOTATION — small bracket showing loop radius -->
  <!-- ============================================================ -->

  <!-- Tight loop ring around brain+agent -->
  <ellipse cx="760" cy="362" rx="210" ry="168"
    fill="none"
    stroke="rgba(200,165,90,0.08)"
    stroke-width="1"
    stroke-dasharray="2 6"/>

  <!-- "tight" callout -->
  <text x="756" y="558"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.16em"
    fill="rgba(200,165,90,0.48)">TIGHT COGNITIVE LOOP</text>

  <!-- ============================================================ -->
  <!-- BOTTOM INVARIANT -->
  <!-- ============================================================ -->

  <line x1="80" y1="648" x2="1200" y2="648"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <text x="640" y="672"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="15" font-style="italic"
    letter-spacing="0.02em"
    fill="rgba(255,255,255,0.56)">without persistence, the agent isn't a collaborator — it's a stranger</text>

  <text x="640" y="694"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="10" letter-spacing="0.10em"
    fill="rgba(200,165,90,0.75)">worklog · context · steering — these are loop architecture, not productivity tips</text>

</svg>
</div>
</body>
</html>
