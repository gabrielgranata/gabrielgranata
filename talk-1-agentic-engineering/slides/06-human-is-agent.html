<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Human Is the Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090b;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .slide {
    width: 1280px;
    height: 720px;
    background: #09090b;
    position: relative;
    overflow: hidden;
  }
</style>
</head>
<body>
<div class="slide">
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Deep vignette — heavier than other slides -->
    <radialGradient id="vignette" cx="50%" cy="52%" r="65%">
      <stop offset="0%"   stop-color="#09090b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </radialGradient>

    <!-- The body's presence — warm, amber, almost biological -->
    <radialGradient id="bodyPresence" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#D4A96A" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#C8853A" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#B8722A" stop-opacity="0"/>
    </radialGradient>

    <!-- Environment ring — cooler, more diffuse -->
    <radialGradient id="envGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8AACB8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4A8CA8" stop-opacity="0"/>
    </radialGradient>

    <!-- Culture ring — even more diffuse, blueish -->
    <radialGradient id="cultureGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#5A6CB8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3A4CA8" stop-opacity="0"/>
    </radialGradient>

    <!-- World rim — barely perceptible -->
    <radialGradient id="worldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="bodyGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="quoteGlow" x="-5%" y="-40%" width="110%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="textGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      @keyframes breathe {
        0%, 100% { opacity: 0.85; r: 14px; }
        50%       { opacity: 1.0;  r: 16px; }
      }
      @keyframes ringPulse1 {
        0%, 100% { opacity: 0.55; }
        50%       { opacity: 0.85; }
      }
      @keyframes ringPulse2 {
        0%, 100% { opacity: 0.30; }
        50%       { opacity: 0.50; }
      }
      @keyframes ringPulse3 {
        0%, 100% { opacity: 0.16; }
        50%       { opacity: 0.28; }
      }
      @keyframes rimPulse {
        0%, 100% { opacity: 0.07; }
        50%       { opacity: 0.13; }
      }
      @keyframes threadFloat {
        0%, 100% { opacity: 0.12; }
        50%       { opacity: 0.22; }
      }
      .body-core { animation: breathe 4s ease-in-out infinite; }
      .ring-1 { animation: ringPulse1 5s ease-in-out infinite; }
      .ring-2 { animation: ringPulse2 6s ease-in-out infinite; animation-delay: 0.8s; }
      .ring-3 { animation: ringPulse3 7s ease-in-out infinite; animation-delay: 1.6s; }
      .ring-4 { animation: rimPulse   9s ease-in-out infinite; animation-delay: 2.4s; }
      .thread { animation: threadFloat 5s ease-in-out infinite; }
    </style>

  </defs>

  <!-- ============================================================ -->
  <!-- THE DIAGRAM — centered, slightly left of center to allow
       text annotations on the right                               -->
  <!-- Center: cx=490, cy=370                                       -->
  <!-- ============================================================ -->

  <!-- World atmosphere — outermost, barely there -->
  <ellipse cx="490" cy="370" rx="340" ry="310" fill="url(#worldGlow)" opacity="0.8"/>

  <!-- Culture layer atmosphere -->
  <ellipse cx="490" cy="370" rx="265" ry="245" fill="url(#cultureGlow)" opacity="1"/>

  <!-- Environment layer atmosphere -->
  <ellipse cx="490" cy="370" rx="182" ry="170" fill="url(#envGlow)" opacity="1"/>

  <!-- Body presence — the warmth at center -->
  <ellipse cx="490" cy="370" rx="90"  ry="86"  fill="url(#bodyPresence)" opacity="1"
    filter="url(#bodyGlow)"/>

  <!-- ── RING 4: WORLD — outermost -->
  <!-- Irregular, not a perfect circle — the world doesn't have clean edges -->
  <ellipse cx="490" cy="370" rx="330" ry="298"
    fill="none"
    stroke="rgba(255,255,255,0.90)"
    stroke-width="0.8"
    class="ring-4"
    filter="url(#ringGlow)"/>
  <!-- Break the ring slightly — world is open, not closed -->
  <path d="M 490 72 A 330 298 0 1 1 489 72"
    fill="none"
    stroke="rgba(255,255,255,0.90)"
    stroke-width="0.8"
    stroke-dasharray="280 180"
    class="ring-4"/>

  <!-- ── RING 3: CULTURE -->
  <ellipse cx="490" cy="370" rx="254" ry="232"
    fill="none"
    stroke="rgba(90,108,184,0.28)"
    stroke-width="1"
    stroke-dasharray="8 5"
    class="ring-3"
    filter="url(#ringGlow)"/>

  <!-- ── RING 2: ENVIRONMENT / PRACTICE -->
  <ellipse cx="490" cy="370" rx="170" ry="158"
    fill="none"
    stroke="rgba(106,172,184,0.38)"
    stroke-width="1.2"
    stroke-dasharray="5 7"
    class="ring-2"
    filter="url(#ringGlow)"/>

  <!-- ── RING 1: EMBODIED ENGAGEMENT — closest to the body -->
  <ellipse cx="490" cy="370" rx="88" ry="82"
    fill="none"
    stroke="rgba(212,169,106,0.70)"
    stroke-width="1.4"
    class="ring-1"
    filter="url(#ringGlow)"/>

  <!-- ── THE BODY — center presence -->
  <!-- Not a figurative human — a point of warmth, of being-there -->
  <circle cx="490" cy="370" r="15"
    fill="rgba(212,169,106,0.85)"
    filter="url(#bodyGlow)"
    class="body-core"/>
  <circle cx="490" cy="370" r="7"
    fill="rgba(232,196,140,0.95)"
    filter="url(#softGlow)"/>
  <circle cx="490" cy="370" r="3"
    fill="rgba(255,232,196,1.0)"/>

  <!-- ── THREADS — meaning radiating outward from engagement
       Not clean vectors — they branch, fork, fade
       These represent the actual pathways of meaning-making -->

  <!-- Thread 1: upward toward culture — strong -->
  <path d="M 490 355 C 488 310, 472 258, 455 195"
    fill="none" stroke="rgba(212,169,106,0.22)" stroke-width="1"
    class="thread"/>
  <path d="M 490 355 C 492 308, 510 260, 528 194"
    fill="none" stroke="rgba(212,169,106,0.18)" stroke-width="0.8"
    class="thread" style="animation-delay:0.4s"/>

  <!-- Thread 2: rightward toward environment -->
  <path d="M 504 370 C 548 365, 592 348, 638 325"
    fill="none" stroke="rgba(106,172,184,0.38)" stroke-width="1"
    class="thread" style="animation-delay:0.8s"/>
  <path d="M 504 375 C 546 382, 590 395, 634 412"
    fill="none" stroke="rgba(106,172,184,0.14)" stroke-width="0.8"
    class="thread" style="animation-delay:1.2s"/>

  <!-- Thread 3: leftward -->
  <path d="M 476 365 C 432 355, 385 338, 340 318"
    fill="none" stroke="rgba(106,172,184,0.65)" stroke-width="0.9"
    class="thread" style="animation-delay:1.6s"/>

  <!-- Thread 4: downward -->
  <path d="M 490 385 C 492 430, 498 472, 488 520"
    fill="none" stroke="rgba(212,169,106,0.16)" stroke-width="0.8"
    class="thread" style="animation-delay:2s"/>

  <!-- Thread 5: diagonal — into world ring -->
  <path d="M 500 358 C 548 318, 610 272, 672 228"
    fill="none" stroke="rgba(180,180,200,0.10)" stroke-width="0.8"
    class="thread" style="animation-delay:1s"/>

  <!-- ── RING LABELS — positioned around rings, not inside text blocks -->

  <!-- Body label — right of center, close -->
  <text x="590" y="365"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(212,169,106,0.70)">body</text>
  <text x="590" y="380"
    font-family="EB Garamond, Georgia, serif"
    font-size="12" font-style="italic"
    fill="rgba(255,255,255,0.74)">sensing · acting · failing</text>

  <!-- Environment label — positioned near ring 2 -->
  <text x="672" y="305"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(106,172,184,0.65)">environment</text>
  <text x="672" y="320"
    font-family="EB Garamond, Georgia, serif"
    font-size="12" font-style="italic"
    fill="rgba(255,255,255,0.90)">tools · colleagues · friction</text>

  <!-- Culture label — near ring 3 -->
  <text x="490" y="112"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(90,108,184,0.55)">culture</text>
  <text x="490" y="128"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="12" font-style="italic"
    fill="rgba(255,255,255,0.94)">language · practice · tradition</text>

  <!-- World label — top, faint -->
  <text x="490" y="66"
    text-anchor="middle"
    font-family="IBM Plex Mono, monospace"
    font-size="8" letter-spacing="0.18em"
    fill="rgba(255,255,255,0.92)">world</text>

  <!-- ============================================================ -->
  <!-- VERTICAL RULE                                                 -->
  <!-- ============================================================ -->

  <line x1="770" y1="90" x2="770" y2="630"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- RIGHT: THE PHILOSOPHICAL ARGUMENT                            -->
  <!-- ============================================================ -->

  <!-- Title — the core claim -->
  <text x="800" y="130"
    font-family="EB Garamond, Georgia, serif"
    font-size="36" font-style="italic"
    fill="rgba(255,255,255,0.94)"
    filter="url(#textGlow)">the human</text>

  <text x="800" y="172"
    font-family="EB Garamond, Georgia, serif"
    font-size="36" font-style="italic"
    fill="rgba(255,255,255,0.94)"
    filter="url(#textGlow)">is the agent</text>

  <line x1="800" y1="192" x2="1198" y2="192"
    stroke="rgba(212,169,106,0.22)" stroke-width="1"/>

  <!-- Beat 1: Merleau-Ponty — the body as primary -->
  <text x="800" y="224"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(255,255,255,0.94)">Merleau-Ponty  ·  1945</text>

  <text x="800" y="252"
    font-family="EB Garamond, Georgia, serif"
    font-size="15" font-style="italic"
    fill="rgba(255,255,255,0.90)">meaning isn't computed. it's inhabited.</text>

  <text x="800" y="276"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.56)">the body is our primary site of knowing —</text>
  <text x="800" y="294"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.56)">not the brain processing inputs, but the body</text>
  <text x="800" y="312"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.56)">thrown into a world, making sense through action.</text>

  <line x1="800" y1="336" x2="1198" y2="336"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Beat 2: Varela / Enactivism — enacted, not represented -->
  <text x="800" y="360"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(255,255,255,0.94)">Varela · Thompson · Rosch  ·  1991</text>

  <text x="800" y="388"
    font-family="EB Garamond, Georgia, serif"
    font-size="15" font-style="italic"
    fill="rgba(255,255,255,0.90)">cognition is enacted, not represented</text>

  <text x="800" y="412"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.56)">your ontological framework isn't a map</text>
  <text x="800" y="430"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.56)">stored in a head. it emerges continuously</text>
  <text x="800" y="448"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.56)">from your engagement with the environment.</text>

  <line x1="800" y1="472" x2="1198" y2="472"
    stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Beat 3: Geertz — culture is this, scaled -->
  <text x="800" y="496"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.14em"
    fill="rgba(255,255,255,0.94)">Geertz  ·  1973</text>

  <!-- The Geertz quote — the slide's landing -->
  <text x="800" y="528"
    font-family="EB Garamond, Georgia, serif"
    font-size="17" font-style="italic"
    fill="rgba(212,169,106,0.90)"
    filter="url(#quoteGlow)">&#x201C;man is an animal suspended</text>

  <text x="800" y="554"
    font-family="EB Garamond, Georgia, serif"
    font-size="17" font-style="italic"
    fill="rgba(212,169,106,0.90)"
    filter="url(#quoteGlow)">in webs of significance</text>

  <text x="800" y="580"
    font-family="EB Garamond, Georgia, serif"
    font-size="17" font-style="italic"
    fill="rgba(212,169,106,0.90)"
    filter="url(#quoteGlow)">he himself has spun&#x201D;</text>

  <text x="800" y="610"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.76)">cultures are meaning-making, scaled.</text>
  <text x="800" y="628"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.76)">the web is built the same way the model is —</text>
  <text x="800" y="646"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.56)">through bodies, acting, over time.</text>

  <!-- ============================================================ -->
  <!-- BOTTOM LEFT: diagram annotation — what the diagram says      -->
  <!-- ============================================================ -->

  <text x="490" y="638"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.56)">the ontological framework isn't in the head.</text>
  <text x="490" y="656"
    text-anchor="middle"
    font-family="EB Garamond, Georgia, serif"
    font-size="13" font-style="italic"
    fill="rgba(255,255,255,0.56)">it is the accumulated history of these encounters.</text>

  <!-- ============================================================ -->
  <!-- VIGNETTE                                                      -->
  <!-- ============================================================ -->

  <rect x="0" y="0" width="1280" height="720" fill="url(#vignette)"/>

  <text x="1198" y="700"
    text-anchor="end"
    font-family="IBM Plex Mono, monospace"
    font-size="9" letter-spacing="0.12em"
    fill="rgba(255,255,255,0.90)">Merleau-Ponty · Varela · Geertz · Dewey</text>

</svg>
</div>
</body>
</html>
